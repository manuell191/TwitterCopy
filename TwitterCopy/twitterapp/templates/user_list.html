{% extends './base.html' %}

{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static 'styles.css' %}">
{% endblock %}

{% block content %}
<div class="navbar">
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'postlist' %}">Browse</a>
    <a class="here" href="{% url 'userlist' %}">Users</a>
</div>

<h1>User List</h1>
<hr>
<table>
    <tr>
        <th>
            Username
        </th>
        <th>
        </th>
    </tr>
    {% for user in user_list %}
    <tr>
        <td>
            {{ user.username }}
        </td>
        <td>
            <a class="button" href="{% url 'userdelete' user.id %}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
