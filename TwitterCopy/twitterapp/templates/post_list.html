{% extends './base.html' %}

{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static 'styles.css' %}">
{% endblock %}

{% block content %}
<div class="navbar">
    <a href="{% url 'home' %}">Home</a>
    <a class="here" href="{% url 'postlist' %}">Browse</a>
    <a href="{% url 'userlist' %}">Users</a>
</div>

<h1>Posts</h1>
<hr>
{% for post in post_list %}
<div>
    <h3><a class="username" href="{% url 'userprofile' post.user.id %}">{{ post.user.username }} says:</a></h3>
    <p>{{ post.content }}</p>
    <a class="button" href="{% url 'postdelete' post.id %}">Delete</a>
</div>
<hr>
{% endfor %}
{% endblock %}
